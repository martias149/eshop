<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eshop</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f4f4f4; color: #222; }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 1rem 2rem;
      font-size: 1.5rem;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #header-right { display: flex; align-items: center; gap: 1rem; font-size: 0.9rem; }
    #user-info { color: #aaa; }
    #login-link { color: #fff; font-size: 0.9rem; text-decoration: none; }
    #login-link:hover { text-decoration: underline; }

    #cart-icon {
      cursor: pointer;
      font-size: 1.1rem;
      position: relative;
      background: none;
      border: none;
      color: #fff;
    }

    #cart-count {
      position: absolute;
      top: -6px; right: -8px;
      background: #e94560;
      color: #fff;
      border-radius: 50%;
      font-size: 0.65rem;
      padding: 2px 5px;
      display: none;
    }

    nav {
      background: #16213e;
      display: flex;
      gap: 0.25rem;
      padding: 0.5rem 2rem;
    }

    nav button {
      background: none;
      border: none;
      color: #aaa;
      padding: 0.4rem 0.9rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.95rem;
    }

    nav button.active { background: #1a1a2e; color: #fff; }

    main { max-width: 1000px; margin: 2rem auto; padding: 0 1rem; }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .toolbar h2 { font-size: 1.2rem; color: #555; }

    .view-toggle { display: flex; gap: 0.4rem; }

    .view-toggle button {
      border: 1px solid #ccc;
      background: #fff;
      padding: 0.4rem 0.7rem;
      border-radius: 5px;
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.15s;
    }

    .view-toggle button.active { background: #1a1a2e; color: #fff; border-color: #1a1a2e; }

    /* PRODUCT GRID */
    #product-list.grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1.2rem;
    }

    #product-list.grid .product-item {
      background: #fff;
      border-radius: 8px;
      padding: 1.2rem;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      text-align: center;
    }

    #product-list.grid .product-item h3 { font-size: 1rem; }
    #product-list.grid .product-item .meta { font-size: 0.8rem; color: #888; }
    #product-list.grid .product-item .description { font-size: 0.85rem; color: #666; flex-grow: 1; }
    #product-list.grid .product-item .price { font-size: 1.1rem; font-weight: bold; color: #1a1a2e; }
    #product-list.grid .product-item .stock { font-size: 0.8rem; color: #999; }

    /* PRODUCT LIST */
    #product-list.list { display: flex; flex-direction: column; gap: 0.6rem; }

    #product-list.list .product-item {
      background: #fff;
      border-radius: 6px;
      padding: 0.9rem 1.2rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      display: grid;
      grid-template-columns: 56px 1fr auto auto;
      grid-template-rows: auto auto auto auto;
      column-gap: 1rem;
      align-items: center;
    }

    #product-list.list .product-item .logo-wrap { grid-column: 1; grid-row: 1 / 5; display: flex; align-items: center; justify-content: center; }
    #product-list.list .product-item h3         { grid-column: 2; grid-row: 1; font-size: 1rem; }
    #product-list.list .product-item .meta      { grid-column: 2; grid-row: 2; font-size: 0.8rem; color: #888; }
    #product-list.list .product-item .description { grid-column: 2; grid-row: 3; font-size: 0.85rem; color: #666; }
    #product-list.list .product-item .actions   { grid-column: 2; grid-row: 4; display: flex; gap: 0.5rem; margin-top: 0.3rem; }
    #product-list.list .product-item .price     { grid-column: 3; grid-row: 1 / 5; font-size: 1.1rem; font-weight: bold; color: #1a1a2e; white-space: nowrap; }
    #product-list.list .product-item .stock     { grid-column: 4; grid-row: 1 / 5; font-size: 0.85rem; color: #999; white-space: nowrap; }

    .logo-img { width: 48px; height: 48px; object-fit: contain; }
    .logo-placeholder { width: 48px; height: 48px; background: #eee; border-radius: 50%; }

    /* BUTTONS */
    .btn { border: none; border-radius: 5px; padding: 0.4rem 0.8rem; cursor: pointer; font-size: 0.82rem; font-weight: 600; }
    .btn-primary { background: #1a1a2e; color: #fff; }
    .btn-primary:hover { background: #16213e; }
    .btn-outline { background: #fff; color: #1a1a2e; border: 1px solid #1a1a2e; }
    .btn-outline:hover { background: #f0f0f0; }

    /* TABLE */
    .data-table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
    .data-table th { background: #1a1a2e; color: #fff; padding: 0.7rem 1rem; text-align: left; font-size: 0.9rem; }
    .data-table td { padding: 0.65rem 1rem; border-bottom: 1px solid #f0f0f0; font-size: 0.9rem; }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: #fafafa; }

    .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 20px; font-size: 0.75rem; font-weight: bold; }
    .badge-pending   { background: #fff3cd; color: #856404; }
    .badge-confirmed { background: #cfe2ff; color: #084298; }
    .badge-shipped   { background: #d1ecf1; color: #0c5460; }
    .badge-delivered { background: #d4edda; color: #155724; }
    .badge-cancelled { background: #f8d7da; color: #721c24; }

    /* MODAL */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: #fff; border-radius: 10px; padding: 1.5rem; width: 100%; max-width: 400px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
    .modal h3 { margin-bottom: 1rem; font-size: 1.1rem; }
    .modal label { display: block; font-size: 0.85rem; color: #555; margin-bottom: 0.25rem; margin-top: 0.75rem; }
    .modal input, .modal textarea { width: 100%; padding: 0.5rem 0.7rem; border: 1px solid #ccc; border-radius: 5px; font-size: 0.95rem; font-family: inherit; }
    .modal textarea { resize: vertical; min-height: 80px; }
    .modal-footer { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 1.2rem; }

    .star-row { display: flex; gap: 0.3rem; font-size: 1.5rem; cursor: pointer; margin-top: 0.25rem; }
    .star-row span { color: #ccc; transition: color 0.1s; }
    .star-row span.selected { color: #f5a623; }

    .success-msg { color: green; font-size: 0.85rem; margin-top: 0.5rem; }
    .error-inline { color: red; font-size: 0.85rem; margin-top: 0.5rem; }

    /* CART DRAWER */
    .cart-drawer { position: fixed; top: 0; right: -380px; width: 360px; height: 100%; background: #fff; box-shadow: -4px 0 20px rgba(0,0,0,0.15); z-index: 200; transition: right 0.3s ease; display: flex; flex-direction: column; }
    .cart-drawer.open { right: 0; }
    .cart-drawer-header { background: #1a1a2e; color: #fff; padding: 1rem 1.2rem; display: flex; align-items: center; justify-content: space-between; font-weight: bold; }
    .cart-drawer-header button { background: none; border: none; color: #fff; font-size: 1.3rem; cursor: pointer; }
    .cart-items-list { flex: 1; overflow-y: auto; padding: 1rem; }
    .cart-item-row { display: flex; align-items: center; justify-content: space-between; padding: 0.6rem 0; border-bottom: 1px solid #f0f0f0; font-size: 0.9rem; }
    .cart-item-row:last-child { border-bottom: none; }
    .cart-item-name { flex: 1; font-weight: 500; }
    .cart-item-qty { color: #888; margin: 0 0.8rem; }
    .cart-item-remove { background: none; border: none; color: #e94560; cursor: pointer; font-size: 1rem; }
    .cart-empty { color: #aaa; text-align: center; margin-top: 2rem; }

    #error-msg { color: red; margin-bottom: 1rem; }
    #loading { color: #888; }
    .section { display: none; }
    .section.active { display: block; }
  </style>
</head>
<body>

<header>
  🛒 Eshop
  <div id="header-right">
    <span id="user-info"></span>
    <a id="login-link" href="/admin/login/?next=/" hidden>Přihlásit se</a>
    <button id="cart-icon" title="Košík" hidden>
      🛒 Košík
      <span id="cart-count"></span>
    </button>
  </div>
</header>

<nav>
  <button class="active" data-section="products">Produkty</button>
  <button data-section="brands">Značky</button>
  <button data-section="categories">Kategorie</button>
  <button data-section="orders">Objednávky</button>
  <button data-section="customers">Zákazníci</button>
  <button data-section="reviews">Hodnocení</button>
</nav>

<main>
  <p id="loading" hidden>Načítám...</p>
  <p id="error-msg" hidden></p>

  <div id="section-products" class="section active">
    <div class="toolbar">
      <h2>Produkty</h2>
      <div class="view-toggle">
        <button id="btn-list">☰ Seznam</button>
        <button id="btn-grid" class="active">⊞ Mřížka</button>
      </div>
    </div>
    <div id="product-list" class="grid"></div>
  </div>

  <div id="section-brands" class="section">
    <div class="toolbar"><h2>Značky</h2></div>
    <table class="data-table">
      <thead><tr><th>Název</th><th>Země</th><th>Logo</th></tr></thead>
      <tbody id="brands-body"></tbody>
    </table>
  </div>

  <div id="section-categories" class="section">
    <div class="toolbar"><h2>Kategorie</h2></div>
    <table class="data-table">
      <thead><tr><th>Název</th><th>Slug</th></tr></thead>
      <tbody id="categories-body"></tbody>
    </table>
  </div>

  <div id="section-orders" class="section">
    <div class="toolbar"><h2>Objednávky</h2></div>
    <table class="data-table">
      <thead><tr><th>#</th><th>Zákazník</th><th>Stav</th><th>Celkem</th><th>Datum</th></tr></thead>
      <tbody id="orders-body"></tbody>
    </table>
  </div>

  <div id="section-customers" class="section">
    <div class="toolbar"><h2>Zákazníci</h2></div>
    <table class="data-table">
      <thead><tr><th>ID</th><th>Telefon</th></tr></thead>
      <tbody id="customers-body"></tbody>
    </table>
  </div>

  <div id="section-reviews" class="section">
    <div class="toolbar"><h2>Hodnocení</h2></div>
    <table class="data-table">
      <thead><tr><th>Produkt</th><th>Zákazník</th><th>Hodnocení</th><th>Text</th></tr></thead>
      <tbody id="reviews-body"></tbody>
    </table>
  </div>
</main>

<!-- CART DRAWER -->
<div class="cart-drawer" id="cart-drawer">
  <div class="cart-drawer-header">
    🛒 Košík
    <button id="cart-close">✕</button>
  </div>
  <div class="cart-items-list" id="cart-items-list">
    <p class="cart-empty">Košík je prázdný.</p>
  </div>
</div>

<!-- ADD TO CART MODAL -->
<div class="modal-overlay" id="modal-cart">
  <div class="modal">
    <h3>Přidat do košíku — <span id="modal-cart-name"></span></h3>
    <label>Množství</label>
    <input id="mc-qty" type="number" value="1" min="1">
    <p id="mc-msg" class="error-inline" hidden></p>
    <p id="mc-ok" class="success-msg" hidden>Přidáno do košíku ✓</p>
    <div class="modal-footer">
      <button class="btn btn-outline" id="mc-cancel">Zrušit</button>
      <button class="btn btn-primary" id="mc-submit">Přidat</button>
    </div>
  </div>
</div>

<!-- REVIEW MODAL -->
<div class="modal-overlay" id="modal-review">
  <div class="modal">
    <h3>Hodnotit — <span id="modal-review-name"></span></h3>
    <label>Hodnocení</label>
    <div class="star-row" id="star-row">
      <span data-v="1">★</span><span data-v="2">★</span><span data-v="3">★</span><span data-v="4">★</span><span data-v="5">★</span>
    </div>
    <label>Text (nepovinné)</label>
    <textarea id="mr-text" placeholder="Váš komentář..."></textarea>
    <p id="mr-msg" class="error-inline" hidden></p>
    <p id="mr-ok" class="success-msg" hidden>Hodnocení odesláno ✓</p>
    <div class="modal-footer">
      <button class="btn btn-outline" id="mr-cancel">Zrušit</button>
      <button class="btn btn-primary" id="mr-submit">Odeslat</button>
    </div>
  </div>
</div>

<script>
  const esc = str => String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

  function getCsrf() {
    return document.cookie.split(';').map(c => c.trim()).find(c => c.startsWith('csrftoken='))?.split('=')[1] ?? '';
  }

  function logoHtml(url, name) {
    if (!url) return '<div class="logo-placeholder"></div>';
    return `<img class="logo-img" src="${url}" alt="${esc(name)}" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'logo-placeholder'}))">`;
  }

  function stars(rating) { return '★'.repeat(rating) + '☆'.repeat(5 - rating); }
  function statusBadge(s) { return `<span class="badge badge-${esc(s)}">${esc(s)}</span>`; }

  async function api(path, opts) {
    const r = await fetch('/api/' + path, opts);
    if (!r.ok) { const txt = await r.text(); throw new Error(txt || `HTTP ${r.status}`); }
    if (r.status === 204) return null;
    const data = await r.json();
    return Array.isArray(data) ? data : (data.results ?? data);
  }

  const loading = document.getElementById('loading');
  const errorMsg = document.getElementById('error-msg');

  async function load(fn) {
    loading.hidden = false; errorMsg.hidden = true;
    try { await fn(); }
    catch (err) { errorMsg.hidden = false; errorMsg.textContent = 'Chyba: ' + err.message; }
    finally { loading.hidden = true; }
  }

  // ── CURRENT USER ──────────────────────────────────────────────
  let currentUser = null; // { authenticated, customer_id, cart_id }

  async function loadCurrentUser() {
    try {
      currentUser = await api('me/');
    } catch {
      currentUser = { authenticated: false };
    }

    const cartIcon = document.getElementById('cart-icon');
    const loginLink = document.getElementById('login-link');
    const userInfo = document.getElementById('user-info');

    if (currentUser.authenticated) {
      cartIcon.hidden = false;
      loginLink.hidden = true;
      userInfo.textContent = currentUser.customer_id ? `Zákazník #${currentUser.customer_id}` : '';
      updateCartBadge();
    } else {
      cartIcon.hidden = true;
      loginLink.hidden = false;
      userInfo.textContent = '';
    }
  }

  // ── CART ──────────────────────────────────────────────────────
  const localCart = JSON.parse(localStorage.getItem('eshop_cart') || '[]');
  function saveCart() { localStorage.setItem('eshop_cart', JSON.stringify(localCart)); }

  function updateCartBadge() {
    const count = localCart.reduce((s, i) => s + i.quantity, 0);
    const el = document.getElementById('cart-count');
    el.textContent = count;
    el.style.display = count > 0 ? 'inline' : 'none';
  }

  function renderCartDrawer() {
    const list = document.getElementById('cart-items-list');
    if (localCart.length === 0) {
      list.innerHTML = '<p class="cart-empty">Košík je prázdný.</p>';
    } else {
      list.innerHTML = localCart.map((item, idx) => `
        <div class="cart-item-row">
          <span class="cart-item-name">${esc(item.productName)}</span>
          <span class="cart-item-qty">${item.quantity} ks</span>
          <button class="cart-item-remove" data-idx="${idx}">✕</button>
        </div>`).join('');
      list.querySelectorAll('.cart-item-remove').forEach(btn => {
        btn.addEventListener('click', () => {
          localCart.splice(+btn.dataset.idx, 1);
          saveCart(); updateCartBadge(); renderCartDrawer();
        });
      });
    }
  }

  document.getElementById('cart-icon').addEventListener('click', () => {
    renderCartDrawer();
    document.getElementById('cart-drawer').classList.add('open');
  });
  document.getElementById('cart-close').addEventListener('click', () => {
    document.getElementById('cart-drawer').classList.remove('open');
  });

  // ── ADD TO CART MODAL ─────────────────────────────────────────
  let cartProductId = null;

  function openCartModal(productId, productName) {
    cartProductId = productId;
    document.getElementById('modal-cart-name').textContent = productName;
    document.getElementById('mc-qty').value = 1;
    document.getElementById('mc-msg').hidden = true;
    document.getElementById('mc-ok').hidden = true;
    document.getElementById('modal-cart').classList.add('open');
  }

  document.getElementById('mc-cancel').addEventListener('click', () => {
    document.getElementById('modal-cart').classList.remove('open');
  });

  document.getElementById('mc-submit').addEventListener('click', async () => {
    const qty = parseInt(document.getElementById('mc-qty').value) || 1;
    const msg = document.getElementById('mc-msg');
    const ok = document.getElementById('mc-ok');
    msg.hidden = true; ok.hidden = true;

    if (currentUser.cart_id) {
      try {
        // find existing cart item for this product
        const items = await api(`cart-items/?cart=${currentUser.cart_id}`);
        const existing = Array.isArray(items) && items.find(i => i.product === cartProductId);
        if (existing) {
          await api(`cart-items/${existing.id}/`, {
            method: 'PATCH',
            headers: {'Content-Type': 'application/json', 'X-CSRFToken': getCsrf()},
            body: JSON.stringify({quantity: existing.quantity + qty}),
          });
        } else {
          await api('cart-items/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'X-CSRFToken': getCsrf()},
            body: JSON.stringify({cart: currentUser.cart_id, product: cartProductId, quantity: qty}),
          });
        }
      } catch (err) {
        msg.textContent = err.message;
        msg.hidden = false;
        return;
      }
    }

    const name = document.getElementById('modal-cart-name').textContent;
    const existing = localCart.find(i => i.productId === cartProductId);
    if (existing) existing.quantity += qty;
    else localCart.push({productId: cartProductId, productName: name, quantity: qty});
    saveCart(); updateCartBadge();
    ok.hidden = false;
    setTimeout(() => document.getElementById('modal-cart').classList.remove('open'), 900);
  });

  // ── REVIEW MODAL ──────────────────────────────────────────────
  let reviewProductId = null;
  let selectedRating = 0;

  document.getElementById('star-row').addEventListener('click', e => {
    if (!e.target.dataset.v) return;
    selectedRating = +e.target.dataset.v;
    document.querySelectorAll('#star-row span').forEach(s => {
      s.classList.toggle('selected', +s.dataset.v <= selectedRating);
    });
  });

  function openReviewModal(productId, productName) {
    reviewProductId = productId;
    selectedRating = 0;
    document.getElementById('modal-review-name').textContent = productName;
    document.getElementById('mr-text').value = '';
    document.getElementById('mr-msg').hidden = true;
    document.getElementById('mr-ok').hidden = true;
    document.querySelectorAll('#star-row span').forEach(s => s.classList.remove('selected'));
    document.getElementById('modal-review').classList.add('open');
  }

  document.getElementById('mr-cancel').addEventListener('click', () => {
    document.getElementById('modal-review').classList.remove('open');
  });

  document.getElementById('mr-submit').addEventListener('click', async () => {
    const text = document.getElementById('mr-text').value.trim();
    const msg = document.getElementById('mr-msg');
    const ok = document.getElementById('mr-ok');
    msg.hidden = true; ok.hidden = true;

    if (!selectedRating) { msg.textContent = 'Vyberte hodnocení.'; msg.hidden = false; return; }

    try {
      await api('reviews/', {
        method: 'POST',
        headers: {'Content-Type': 'application/json', 'X-CSRFToken': getCsrf()},
        body: JSON.stringify({product: reviewProductId, customer: currentUser.customer_id, rating: selectedRating, text}),
      });
      ok.hidden = false;
      setTimeout(() => document.getElementById('modal-review').classList.remove('open'), 900);
    } catch (err) {
      msg.textContent = err.message;
      msg.hidden = false;
    }
  });

  // ── PRODUCT CARD ──────────────────────────────────────────────
  function productCardHtml(p, loggedIn) {
    const actions = loggedIn ? `
      <div class="actions">
        <button class="btn btn-primary btn-add-cart" data-id="${p.id}" data-name="${esc(p.name)}">🛒 Do košíku</button>
        <button class="btn btn-outline btn-review" data-id="${p.id}" data-name="${esc(p.name)}">★ Hodnotit</button>
      </div>` : '';
    return `
      <div class="product-item">
        <div class="logo-wrap">${logoHtml(p.logo_url, p.name)}</div>
        <h3>${esc(p.name)}</h3>
        <p class="meta">${p.brand ? esc(p.brand) : ''}${p.category ? ' · ' + esc(p.category) : ''}</p>
        <p class="description">${esc(p.description || '')}</p>
        <p class="price">${parseFloat(p.price).toLocaleString('cs-CZ')} Kč</p>
        <p class="stock">Skladem: ${p.stock} ks</p>
        ${actions}
      </div>`;
  }

  function bindProductButtons(container) {
    container.querySelectorAll('.btn-add-cart').forEach(btn => {
      btn.addEventListener('click', () => openCartModal(+btn.dataset.id, btn.dataset.name));
    });
    container.querySelectorAll('.btn-review').forEach(btn => {
      btn.addEventListener('click', () => openReviewModal(+btn.dataset.id, btn.dataset.name));
    });
  }

  // ── SECTION LOADERS ───────────────────────────────────────────
  async function loadProducts() {
    await load(async () => {
      const products = await api('products/');
      const list = document.getElementById('product-list');
      if (products.length === 0) { list.innerHTML = '<p>Žádné produkty.</p>'; return; }
      list.innerHTML = products.map(p => productCardHtml(p, currentUser?.authenticated)).join('');
      bindProductButtons(list);
    });
  }

  async function loadBrands() {
    await load(async () => {
      const brands = await api('brands/');
      document.getElementById('brands-body').innerHTML = brands.length === 0
        ? '<tr><td colspan="3">Žádné značky.</td></tr>'
        : brands.map(b => `<tr><td>${esc(b.name)}</td><td>${esc(b.country || '—')}</td><td>${logoHtml(b.logo_url, b.name)}</td></tr>`).join('');
    });
  }

  async function loadCategories() {
    await load(async () => {
      const cats = await api('categories/');
      document.getElementById('categories-body').innerHTML = cats.length === 0
        ? '<tr><td colspan="2">Žádné kategorie.</td></tr>'
        : cats.map(c => `<tr><td>${esc(c.name)}</td><td><code>${esc(c.slug)}</code></td></tr>`).join('');
    });
  }

  async function loadOrders() {
    await load(async () => {
      const orders = await api('orders/');
      document.getElementById('orders-body').innerHTML = orders.length === 0
        ? '<tr><td colspan="5">Žádné objednávky.</td></tr>'
        : orders.map(o => `<tr>
            <td>#${o.id}</td><td>${esc(o.customer)}</td><td>${statusBadge(o.status)}</td>
            <td>${parseFloat(o.total).toLocaleString('cs-CZ')} Kč</td>
            <td>${new Date(o.created_at).toLocaleDateString('cs-CZ')}</td>
          </tr>`).join('');
    });
  }

  async function loadCustomers() {
    await load(async () => {
      const customers = await api('customers/');
      document.getElementById('customers-body').innerHTML = customers.length === 0
        ? '<tr><td colspan="2">Žádní zákazníci.</td></tr>'
        : customers.map(c => `<tr><td>${esc(c.id)}</td><td>${esc(c.phone || '—')}</td></tr>`).join('');
    });
  }

  async function loadReviews() {
    await load(async () => {
      const reviews = await api('reviews/');
      document.getElementById('reviews-body').innerHTML = reviews.length === 0
        ? '<tr><td colspan="4">Žádná hodnocení.</td></tr>'
        : reviews.map(r => `<tr>
            <td>${esc(r.product)}</td><td>${esc(r.customer)}</td>
            <td title="${r.rating}/5">${stars(r.rating)}</td><td>${esc(r.text || '—')}</td>
          </tr>`).join('');
    });
  }

  // ── NAV ───────────────────────────────────────────────────────
  const loaders = { products: loadProducts, brands: loadBrands, categories: loadCategories, orders: loadOrders, customers: loadCustomers, reviews: loadReviews };

  document.querySelectorAll('nav button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      btn.classList.add('active');
      const section = btn.dataset.section;
      document.getElementById('section-' + section).classList.add('active');
      loaders[section]();
    });
  });

  // ── VIEW TOGGLE ───────────────────────────────────────────────
  document.getElementById('btn-grid').addEventListener('click', () => setView('grid'));
  document.getElementById('btn-list').addEventListener('click', () => setView('list'));

  function setView(view) {
    document.getElementById('product-list').className = view;
    document.getElementById('btn-grid').classList.toggle('active', view === 'grid');
    document.getElementById('btn-list').classList.toggle('active', view === 'list');
  }

  // ── INIT ──────────────────────────────────────────────────────
  loadCurrentUser().then(loadProducts);
</script>

</body>
</html>
